name = "sci-map-quota-monitor"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Cron: every 6 hours. Mapbox's usage/v2 endpoint reports with ~6h lag, so
# checking more frequently mostly returns the same numbers.
[triggers]
crons = ["0 */6 * * *"]

# R2 binding — gives the Worker direct read/write access to the bucket
# that hosts feature-flags.json. The bucket name must match what you
# created in Cloudflare R2; the binding name (SCI_BUCKET) is what
# `env.SCI_BUCKET` refers to inside the Worker.
[[r2_buckets]]
binding = "SCI_BUCKET"
bucket_name = "sci-data"

# Non-secret vars. Defaults match the Mapbox free tier. Override on a
# paid plan or to tune the warn/critical thresholds:
#   wrangler deploy --var MAPBOX_MONTHLY_MAP_LOAD_LIMIT:100000
# The README walks through all of these.
[vars]
MAPBOX_USERNAME                = "mikethechampion"
MAPBOX_MONTHLY_MAP_LOAD_LIMIT  = "50000"
MAPBOX_MONTHLY_TILE_LIMIT      = "200000"
WARN_THRESHOLD                 = "0.8"
CRITICAL_THRESHOLD             = "1.0"
PUBLIC_FLAG_URL                = "https://pub-5433ddd592ff4ca4829ed8c8b77d58d6.r2.dev/feature-flags.json"

# SECRETS (set with `wrangler secret put NAME` — do NOT add here):
#   MAPBOX_SECRET_TOKEN              sk.... with usage:read scope
#   RESEND_API_KEY                   re_... from resend.com
#   EMAIL_FROM                       e.g. "alerts@yourdomain.com"
#   EMAIL_TO                         e.g. "you@gmail.com"
#   WORKER_MANUAL_TRIGGER_SECRET     any string; required to hit the
#                                    Worker URL for a manual run
